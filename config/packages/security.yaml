security:
    password_hashers:
        App\Entity\User:
            algorithm: sha384
            iterations: 3600
            encode_as_base64: false

    providers:
        user_db:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        default:
            pattern: ^/
            form_login:
                provider: user_db
                login_path: app_login
                check_path: login_check
                enable_csrf: true
            logout:
                path: logout
                target: app_login
            custom_authenticators:
                - App\Security\WsseAuthenticator

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS, requires_channel: https }
        - { path: ^/telegram, roles: PUBLIC_ACCESS, requires_channel: https }
        - { path: ^/webhook, roles: PUBLIC_ACCESS, requires_channel: https }
        - { path: ^/api, roles: ROLE_ADMIN, requires_channel: https }
        - { path: ^/admin/preview, roles: ROLE_USER, requires_channel: https }
        - { path: ^/admin, roles: ROLE_ADMIN, requires_channel: https }
